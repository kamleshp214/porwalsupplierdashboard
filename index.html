<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porwal Suppliers — Ledger Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0C1B33;
  --navy2: #112240;
  --gold: #F59E0B;
  --gold-pale: rgba(245,158,11,0.12);
  --gold-ring: rgba(245,158,11,0.3);
  --bhada: #059669;
  --bhada-lt: #ECFDF5;
  --bhada-bd: #6EE7B7;
  --reti: #DC2626;
  --reti-lt: #FEF2F2;
  --reti-bd: #FCA5A5;
  --edit: #2563EB;
  --edit-lt: #EFF6FF;
  --bg: #F0F4F8;
  --card: #FFFFFF;
  --text: #0F172A;
  --muted: #64748B;
  --border: #E2E8F0;
  --radius: 14px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Outfit', sans-serif;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 22px 16px 28px;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -60px;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: var(--gold-pale);
  pointer-events: none;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -40px;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,0.02);
  pointer-events: none;
}

.header-inner {
  max-width: 920px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--gold-pale);
  color: var(--gold);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 99px;
  margin-bottom: 12px;
  border: 1px solid var(--gold-ring);
}

.header-title {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.6px;
  line-height: 1.1;
}

.header-title span {
  color: var(--gold);
}

.header-subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 7px;
  letter-spacing: 0.2px;
}

.header-date-box {
  text-align: right;
  flex-shrink: 0;
}

.header-date-day {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  font-family: var(--mono);
  letter-spacing: 0.5px;
}

.header-date-full {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-family: var(--mono);
  margin-top: 2px;
}

/* ── MAIN ── */
.main {
  max-width: 920px;
  margin: 0 auto;
  padding: 18px 14px 32px;
}

/* ── SUMMARY CARDS ── */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 15px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}

.stat-card.bhada-card::before { background: var(--bhada); }
.stat-card.reti-card::before { background: var(--reti); }
.stat-card.net-card::before { background: var(--gold); }
.stat-card.net-card { grid-column: 1 / -1; }

.stat-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 600;
  line-height: 1;
}

.stat-sub {
  font-size: 11px;
  margin-top: 5px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
}

.net-card .stat-value {
  font-size: 24px;
}

/* ── MONTH FILTER ── */
.filter-row {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.filter-row::-webkit-scrollbar {
  display: none;
}

.tab-btn {
  padding: 7px 14px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--sans);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s ease;
  box-shadow: var(--shadow);
}

.tab-btn:hover {
  border-color: #94A3B8;
  color: var(--text);
}

.tab-btn.active {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}

/* ── ADD FORM ── */
.form-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
  transition: border-color 0.3s ease;
}

.form-card.is-editing {
  border-color: var(--edit);
  box-shadow: 0 0 0 2px var(--edit-lt);
}

.form-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}

.form-toggle.open {
  border-bottom-color: var(--border);
}

.form-toggle-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.is-editing .form-toggle-title {
  color: var(--edit);
}

.form-chevron {
  transition: transform 0.25s ease;
  color: var(--muted);
}

.form-chevron.open {
  transform: rotate(180deg);
}

.form-body {
  padding: 16px;
  display: none;
}

.form-body.open {
  display: block;
}

.form-row-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.form-group.full {
  grid-column: 1 / -1;
}

.form-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 5px;
}

.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-size: 14px;
  font-family: var(--sans);
  color: var(--text);
  background: #FAFBFC;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
}

.form-input:focus {
  border-color: var(--navy);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(12,27,51,0.07);
}

.form-input.bhada-input { border-color: var(--bhada-bd); }
.form-input.bhada-input:focus { border-color: var(--bhada); box-shadow: 0 0 0 3px rgba(5,150,105,0.08); }
.form-input.reti-input { border-color: var(--reti-bd); }
.form-input.reti-input:focus { border-color: var(--reti); box-shadow: 0 0 0 3px rgba(220,38,38,0.08); }

input[type=number] {
  font-family: var(--mono);
}

.form-actions {
  display: flex;
  gap: 10px;
}

.btn-add-entry {
  flex: 1;
  padding: 12px;
  background: var(--navy);
  color: #fff;
  border: none;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--sans);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s, transform 0.1s;
}

.btn-add-entry:hover {
  background: var(--navy2);
}

.btn-add-entry:active {
  transform: scale(0.99);
}

.btn-add-entry.editing {
  background: var(--edit);
}

.btn-add-entry.editing:hover {
  background: #1D4ED8;
}

.btn-cancel {
  display: none;
  padding: 12px 16px;
  background: #F1F5F9;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 9px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

.is-editing .btn-cancel {
  display: block;
}

/* ── TABLE ── */
.table-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.table-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  flex-wrap: wrap;
}

.table-hdr-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.table-hdr-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.btn-export {
  background: #F8FAFC;
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 700;
  color: var(--navy);
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-export:hover {
  background: var(--edit-lt);
  border-color: var(--edit);
  color: var(--edit);
}

.search-box {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 12px;
  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  outline: none;
  width: 100px;
  transition: border-color 0.15s, width 0.2s;
}

.search-box:focus {
  border-color: var(--navy);
  width: 140px;
}

.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px;
}

thead th {
  padding: 9px 12px;
  text-align: right;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  background: #F8FAFC;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: color 0.15s;
}

thead th:first-child {
  text-align: left;
  padding-left: 16px;
}

thead th:last-child {
  cursor: default;
  width: 60px;
  text-align: center;
}

thead th:hover:not(:last-child) {
  color: var(--text);
}

thead th.sorted {
  color: var(--navy);
}

.sort-icon {
  margin-left: 3px;
  opacity: 0.4;
  font-style: normal;
  font-size: 11px;
}

thead th.sorted .sort-icon {
  opacity: 1;
}

tbody tr {
  border-bottom: 1px solid #F5F7FA;
  transition: background 0.1s;
}

tbody tr.editing-row {
  background: var(--edit-lt);
}

tbody tr:hover {
  background: #F8FAFC;
}

tbody td {
  padding: 10px 12px;
  font-size: 12px;
  font-family: var(--mono);
  text-align: right;
  white-space: nowrap;
  color: var(--text);
  vertical-align: middle;
}

tbody td:first-child {
  text-align: left;
  font-family: var(--sans);
  padding-left: 16px;
}

tbody td:last-child {
  padding: 0 10px;
  text-align: center;
}

.td-date {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.td-date-main {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  font-family: var(--mono);
}

.td-date-day {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--sans);
  font-weight: 500;
}

.td-bhada { color: var(--bhada); font-weight: 500; }
.td-reti { color: var(--reti); font-weight: 500; }
.td-zero { color: #C8D5E3; }

.pill {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
}

.pill-pos { background: var(--bhada-lt); color: #065F46; }
.pill-neg { background: var(--reti-lt); color: #991B1B; }
.pill-zero { background: #F1F5F9; color: var(--muted); }

.action-btns {
  display: flex;
  gap: 4px;
  justify-content: center;
  opacity: 0.5;
  transition: opacity 0.15s;
}

tbody tr:hover .action-btns {
  opacity: 1;
}

.btn-action {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.btn-edit { color: var(--muted); }
.btn-edit:hover { color: var(--edit); background: var(--edit-lt); }
.btn-del { color: var(--muted); }
.btn-del:hover { color: var(--reti); background: var(--reti-lt); }

.month-row td {
  font-size: 9px;
  font-weight: 800;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 16px 6px;
  background: #F8FAFC;
  border-bottom: 1px solid var(--border);
  font-family: var(--sans);
  text-align: left !important;
}

tfoot tr td {
  padding: 11px 12px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--mono);
  background: #F4F7FB;
  border-top: 2px solid var(--border);
  text-align: right;
}

tfoot tr td:first-child {
  font-family: var(--sans);
  text-align: left;
  padding-left: 16px;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* ── FOOTER ── */
.footer {
  text-align: center;
  padding: 22px 16px 8px;
  font-size: 11px;
  color: #94A3B8;
  letter-spacing: 0.3px;
}

/* ── PRINT STYLES ── */
@media print {
  body { background: white; padding: 0; }
  .header-top, .cards-grid, .filter-row, .form-card, .table-hdr-right, .action-btns, .footer { display: none !important; }
  .header { background: white; color: black; padding: 0 0 20px 0; }
  .header-title { color: black; }
  .header-title span { color: var(--navy); }
  .table-card { border: none; box-shadow: none; }
  table { border-collapse: collapse; }
  thead th, tbody td, tfoot tr td { border: 1px solid #ddd !important; }
  .pill { background: transparent !important; color: black !important; padding: 0; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-badge">Daily Ledger</div>
        <h1 class="header-title">Porwal Suppliers<br><span>Ujjain</span></h1>
        <p class="header-subtitle">Bhada &amp; Reti Account &nbsp;·&nbsp; Abhay Bhaiya</p>
      </div>
      <div class="header-date-box">
        <div class="header-date-day" id="hdr-day"></div>
        <div class="header-date-full" id="hdr-date"></div>
      </div>
    </div>
  </div>
</header>

<main class="main">
  <div class="cards-grid" id="cards-grid"></div>

  <div class="filter-row" id="filter-row"></div>

  <div class="form-card" id="main-form-card">
    <div class="form-toggle open" id="form-toggle">
      <div class="form-toggle-title" id="form-title">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <span>Add New Entry</span>
      </div>
      <svg class="form-chevron open" id="form-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="form-body open" id="form-body">
      <div class="form-row-grid">
        <div class="form-group full">
          <label class="form-label" for="f-date">Date</label>
          <input class="form-input" type="date" id="f-date">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-bhada" style="color:var(--bhada)">Bhada ₹</label>
          <input class="form-input bhada-input" type="number" id="f-bhada" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-reti" style="color:var(--reti)">Reti ₹</label>
          <input class="form-input reti-input" type="number" id="f-reti" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
        <button class="btn-add-entry" id="btn-add">Add Entry</button>
      </div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-hdr">
      <div class="table-hdr-title">Transaction History</div>
      <div class="table-hdr-right">
        <button class="btn-export" onclick="exportExcel()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <input class="search-box" type="text" id="search-box" placeholder="Search…" autocomplete="off">
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-col="date" class="sorted">Date <i class="sort-icon">↓</i></th>
            <th data-col="bhada">Bhada <i class="sort-icon">↕</i></th>
            <th data-col="reti">Reti <i class="sort-icon">↕</i></th>
            <th data-col="net">Net <i class="sort-icon">↕</i></th>
            <th>Act</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>
</main>

<footer class="footer"><strong>Porwal Suppliers, Ujjain</strong> &nbsp;·&nbsp; Abhay Bhaiya</footer>

function loadData() {
  // Changed key to v2 to force fresh data load with the full SEED array
  const savedData = localStorage.getItem('porwal_ledger_data_v2');
  if (savedData) {
    const parsed = JSON.parse(savedData);
    entries = parsed.entries;
    nextId = parsed.nextId || entries.length + 1;
  } else {
    entries = SEED.map(([d,b,r],i) => ({id:i, date:d, bhada:b, reti:r}));
    nextId = SEED.length;
    saveData();
  }
}

function saveData() {
  localStorage.setItem('porwal_ledger_data_v2', JSON.stringify({ entries, nextId }));
}

loadData();

let sortCol  = 'date';
let sortDir  = 'desc';
let filterMo = 'all';
let searchQ  = '';

/* ── HELPERS ── */
const DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DSHRT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MSHRT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function inr(n) { 
  return n === 0 ? '—' : '₹' + Math.abs(n).toLocaleString('en-IN'); 
}

function inrFull(n) { 
  return '₹' + Math.abs(n).toLocaleString('en-IN'); 
}

function fmtDate(iso) { 
  const d = new Date(iso + 'T00:00:00'); 
  return d.getDate() + ' ' + MSHRT[d.getMonth()] + ' \'' + String(d.getFullYear()).slice(2); 
}

function fmtDow(iso) { 
  return DSHRT[new Date(iso + 'T00:00:00').getDay()]; 
}

function monthKey(iso) { 
  return iso.slice(0,7); 
}

function monthLabel(mk) { 
  const d = new Date(mk + '-01'); 
  return MONS[d.getMonth()] + ' ' + d.getFullYear(); 
}

function getFiltered() {
  let list = filterMo === 'all' ? entries : entries.filter(e => e.date.startsWith(filterMo));
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(e => 
      e.date.includes(q) || 
      fmtDate(e.date).toLowerCase().includes(q) || 
      DAYS[new Date(e.date + 'T00:00:00').getDay()].toLowerCase().includes(q)
    );
  }
  return list;
}

function getSorted(list) {
  return [...list].sort((a,b) => {
    let c = (sortCol === 'date') ? a.date.localeCompare(b.date) :
            (sortCol === 'bhada') ? a.bhada - b.bhada :
            (sortCol === 'reti') ? a.reti - b.reti : 
            (a.bhada - a.reti) - (b.bhada - b.reti);
    return sortDir === 'asc' ? c : -c;
  });
}

function totals(list) { 
  return list.reduce((acc,e) => ({ b: acc.b + e.bhada, r: acc.r + e.reti }), { b: 0, r: 0 }); 
}

/* ── RENDER ENGINE ── */
function renderCards() {
  const t = totals(getFiltered());
  const net = t.b - t.r;
  const pos = net >= 0;
  
  document.getElementById('cards-grid').innerHTML = `
    <div class="stat-card bhada-card">
      <div class="stat-label">Total Bhada</div>
      <div class="stat-value" style="color:var(--bhada)">${inrFull(t.b)}</div>
      <div class="stat-sub" style="color:#34D399">Receivable</div>
    </div>
    <div class="stat-card reti-card">
      <div class="stat-label">Total Reti</div>
      <div class="stat-value" style="color:var(--reti)">${inrFull(t.r)}</div>
      <div class="stat-sub" style="color:#F87171">Payable</div>
    </div>
    <div class="stat-card net-card">
      <div class="stat-label">Net Balance</div>
      <div class="stat-value" style="color:${pos ? '#059669' : '#DC2626'}">${inrFull(Math.abs(net))}</div>
      <div class="stat-sub" style="color:${pos ? '#059669' : '#DC2626'}; font-weight:700">
        ${pos ? 'Client owes you' : 'You owe Client'}
      </div>
    </div>
  `;
}

function renderTabs() {
  const months = [...new Set(entries.map(e => monthKey(e.date)))].sort();
  let html = `<button class="tab-btn${filterMo === 'all' ? ' active' : ''}" data-m="all">All Time</button>`;
  
  months.forEach(mk => { 
    html += `<button class="tab-btn${filterMo === mk ? ' active' : ''}" data-m="${mk}">${monthLabel(mk)}</button>`; 
  });
  
  document.getElementById('filter-row').innerHTML = html;
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { 
      filterMo = btn.dataset.m; 
      render(); 
    });
  });
}

function renderTable() {
  const filtered = getFiltered();
  const sorted = getSorted(filtered);
  const tot = totals(filtered);
  
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const col = th.dataset.col;
    if (col === sortCol) { 
      th.classList.add('sorted'); 
      th.querySelector('.sort-icon').textContent = sortDir === 'asc' ? '↑' : '↓'; 
    } else { 
      th.classList.remove('sorted'); 
      th.querySelector('.sort-icon').textContent = '↕'; 
    }
  });

  if (sorted.length === 0) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="5" style="text-align:center; padding:30px; color:var(--muted)">No entries found.</td></tr>`;
    document.getElementById('tfoot').innerHTML = '';
    return;
  }

  let rows = '';
  let lastMk = '';
  
  sorted.forEach(e => {
    const mk = monthKey(e.date);
    if (sortCol === 'date' && filterMo === 'all' && mk !== lastMk) {
      rows += `<tr class="month-row"><td colspan="5">${monthLabel(mk)}</td></tr>`; 
      lastMk = mk;
    }
    
    const dayNet = e.bhada - e.reti;
    const pillCls = dayNet > 0 ? 'pill-pos' : dayNet < 0 ? 'pill-neg' : 'pill-zero';
    const pillTxt = dayNet === 0 ? '₹0' : (dayNet > 0 ? '+' : '-') + '₹' + Math.abs(dayNet).toLocaleString('en-IN');
    const isRowEditing = editingId === e.id ? 'editing-row' : '';

    rows += `<tr class="${isRowEditing}">
      <td>
        <div class="td-date">
          <span class="td-date-main">${fmtDate(e.date)}</span>
          <span class="td-date-day">${fmtDow(e.date)}</span>
        </div>
      </td>
      <td class="${e.bhada > 0 ? 'td-bhada' : 'td-zero'}">${inr(e.bhada)}</td>
      <td class="${e.reti > 0 ? 'td-reti' : 'td-zero'}">${inr(e.reti)}</td>
      <td><span class="pill ${pillCls}">${pillTxt}</span></td>
      <td>
        <div class="action-btns">
          <button class="btn-action btn-edit" onclick="startEdit(${e.id})" title="Edit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
          <button class="btn-action btn-del" onclick="deleteEntry(${e.id})" title="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  });
  
  document.getElementById('tbody').innerHTML = rows;

  const tNet = tot.b - tot.r;
  const tPos = tNet >= 0;
  
  document.getElementById('tfoot').innerHTML = `<tr>
    <td>Totals (${filtered.length})</td>
    <td style="color:var(--bhada)">₹${tot.b.toLocaleString('en-IN')}</td>
    <td style="color:var(--reti)">₹${tot.r.toLocaleString('en-IN')}</td>
    <td><span class="pill ${tNet === 0 ? 'pill-zero' : tPos ? 'pill-pos' : 'pill-neg'}">${tNet === 0 ? '₹0' : (tPos ? '+' : '-') + '₹' + Math.abs(tNet).toLocaleString('en-IN')}</span></td>
    <td></td>
  </tr>`;
}

function render() { 
  renderCards(); 
  renderTabs(); 
  renderTable(); 
}

/* ── ACTIONS ── */
function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(e => e.id !== id);
  if (editingId === id) cancelEdit();
  saveData(); 
  render();
}

function startEdit(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  
  editingId = id;
  document.getElementById('f-date').value = e.date;
  document.getElementById('f-bhada').value = e.bhada || '';
  document.getElementById('f-reti').value = e.reti || '';
  
  // UI Changes for Edit Mode
  const formCard = document.getElementById('main-form-card');
  formCard.classList.add('is-editing');
  document.getElementById('form-title').querySelector('span').textContent = 'Edit Entry';
  
  const btnAdd = document.getElementById('btn-add');
  btnAdd.textContent = 'Update Entry';
  btnAdd.classList.add('editing');
  
  // Ensure form is open and visible
  document.getElementById('form-body').classList.add('open');
  document.getElementById('form-chevron').classList.add('open');
  window.scrollTo({ top: formCard.offsetTop - 20, behavior: 'smooth' });
  
  render(); 
}

function cancelEdit() {
  editingId = null;
  document.getElementById('f-bhada').value = '';
  document.getElementById('f-reti').value = '';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  
  // Reset UI
  const formCard = document.getElementById('main-form-card');
  formCard.classList.remove('is-editing');
  document.getElementById('form-title').querySelector('span').textContent = 'Add New Entry';
  
  const btnAdd = document.getElementById('btn-add');
  btnAdd.textContent = 'Add Entry';
  btnAdd.classList.remove('editing');
  
  render();
}

document.getElementById('btn-cancel').addEventListener('click', cancelEdit);

document.getElementById('btn-add').addEventListener('click', () => {
  const dEl = document.getElementById('f-date');
  const bEl = document.getElementById('f-bhada');
  const rEl = document.getElementById('f-reti');
  
  const date = dEl.value;
  if (!date) { 
    dEl.focus(); 
    return; 
  }
  
  const bhada = parseFloat(bEl.value) || 0;
  const reti = parseFloat(rEl.value) || 0;
  
  if (editingId !== null) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx !== -1) {
      entries[idx] = { ...entries[idx], date, bhada, reti };
    }
    cancelEdit();
  } else {
    entries.push({ id: nextId++, date, bhada, reti });
    bEl.value = ''; 
    rEl.value = '';
  }
  
  saveData();
  sortCol = 'date'; 
  sortDir = 'desc';
  render();
});

/* ── EXPORT TO EXCEL (CSV) ── */
function exportExcel() {
  let csv = "Date,Day,Bhada (Rs),Reti (Rs),Net Balance (Rs)\n";
  const filtered = getSorted(getFiltered());
  
  filtered.forEach(e => {
    const net = e.bhada - e.reti;
    csv += `${e.date},${fmtDow(e.date)},${e.bhada},${e.reti},${net}\n`;
  });
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `Porwal_Ledger_${filterMo === 'all' ? 'All_Time' : filterMo}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* ── UI LISTENERS ── */
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else { 
      sortCol = col; 
      sortDir = 'desc'; 
    }
    render();
  });
});

document.getElementById('search-box').addEventListener('input', e => { 
  searchQ = e.target.value.trim(); 
  render(); 
});

document.getElementById('form-toggle').addEventListener('click', () => {
  if (editingId !== null) return; // Disable toggle while editing
  document.getElementById('form-body').classList.toggle('open');
  document.getElementById('form-chevron').classList.toggle('open');
});

/* ── INIT ── */
(function init() {
  const now = new Date();
  document.getElementById('hdr-day').textContent = DAYS[now.getDay()];
  document.getElementById('hdr-date').textContent = now.getDate() + ' ' + MSHRT[now.getMonth()] + ' ' + now.getFullYear();
  
  // Set Date input default to today, and max to today (Date Validation)
  const todayStr = now.toISOString().split('T')[0];
  const dateInput = document.getElementById('f-date');
  dateInput.value = todayStr;
  dateInput.max = todayStr;

  render();
})();
</script>
